[workspace]
members = [
    "crates/prism-cli",
    "crates/prism-audit",
    "crates/prism-deps",
]
resolver = "2"

[workspace.dependencies]
prism-audit = { path = "crates/prism-audit" }
prism-deps = { path = "crates/prism-deps" }
anyhow = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }